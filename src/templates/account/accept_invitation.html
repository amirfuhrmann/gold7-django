{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accept invitation — {{ PLATFORM_NAME }}</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}" />
</head>
<body class="h-full bg-gray-100 dark:bg-dark-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm rounded-xl bg-white dark:bg-dark-surface shadow-sm border border-gray-200 dark:border-dark-border p-8">
    <h1 class="text-xl font-semibold text-center mb-1">Welcome to {{ PLATFORM_NAME }}</h1>
    <p class="text-sm text-gray-500 text-center mb-6">
      Set up your account for <strong>{{ invitation.email }}</strong>
    </p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-xs font-medium text-gray-600 dark:text-gray-300 mb-1">
            {{ field.label }}{% if field.field.required %} *{% endif %}
          </label>
          {{ field }}
          {% for error in field.errors %}
            <p class="mt-1 text-xs text-red-600">{{ error }}</p>
          {% endfor %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary w-full">Create account</button>
    </form>
  </div>
</body>
</html>
