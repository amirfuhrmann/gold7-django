# ==== pytest ====
[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--ds=config.settings.test --reuse-db --import-mode=importlib"
python_files = [
    "tests.py",
    "test_*.py",
]
norecursedirs = ["node_modules"]

# ==== Coverage ====
[tool.coverage.run]
include = ["*/**"]
omit = ["*/migrations/*", "*/tests/*"]
plugins = ["django_coverage_plugin"]

# ==== Ruff ====
[tool.ruff]
target-version = "py312"
extend-exclude = [
    "*/migrations/*.py",
    "staticfiles/*",
]

[tool.ruff.lint]
select = [
  "F", "E", "W", "C90", "I", "N", "UP", "B", "A", "C4",
  "DJ", "ISC", "PIE", "T20", "PT", "Q", "SIM", "TID", "PTH", "RUF",
]
ignore = [
  "S101",
  "RUF012",
  "SIM102",
]

[tool.ruff.lint.isort]
force-single-line = true
